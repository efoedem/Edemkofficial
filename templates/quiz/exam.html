<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{{ course.exam_name }} | {{ course.code }}</title>
    <style>
        /* Keep your existing CSS exactly as it is */
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; height: 100vh; width: 100vw; overflow: hidden; display: flex; flex-direction: column; }
        .exam-header { background: #1e293b; color: white; padding: 15px 30px; display: flex; justify-content: space-between; z-index: 10; }
        .workspace-wrapper { display: flex; flex: 1; width: 100%; height: calc(100vh - 70px); overflow: hidden; }
        .scrollable-content { flex: 1; height: 100%; overflow-y: auto; padding: 30px; }
        #video { width: 180px; position: fixed; top: 85px; right: 20px; border: 3px solid #ef4444; border-radius: 10px; z-index: 1000; background: #000; aspect-ratio: 3/4; object-fit: cover; }
        .timer-box { background: #ef4444; color: white; padding: 8px 16px; border-radius: 6px; font-weight: bold; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 40px; border-radius: 12px; }
        .question-block { margin-bottom: 30px; padding: 20px; border-left: 5px solid #2563eb; background: #f8fafc; }
        .submit-btn { background: #2563eb; color: white; border: none; padding: 14px 35px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        @media (max-width: 768px) { #video { width: 115px; bottom: 20px; top: auto; } }
    </style>
</head>
<body oncontextmenu="return false;" onselectstart="return false;" ondragstart="return false;">

    <div class="exam-header">
        <div><h2>{{ course.exam_name }}</h2></div>
        <div class="timer-box">Time Left: <span id="timer">--:--</span></div>
    </div>

    <div class="workspace-wrapper">
        <video id="video" autoplay muted playsinline></video>
        <div class="scrollable-content">
            <div class="container">
                <form id="quizForm" action="{% url 'submit_quiz' %}" method="POST">
                    {% csrf_token %}
                    <input type="hidden" name="full_name" value="{{ student_name }}">
                    <input type="hidden" name="index_number" value="{{ index_number }}">
                    <input type="hidden" name="course_id" value="{{ course.id }}">
                    <input type="hidden" id="security_breach_flag" name="security_breach" value="false">

                   {% for item in questions_data %}
    <div class="question-block">
        <p><strong>{{ forloop.counter }}. {{ item.q.text }}</strong></p>

        {% if item.q.q_type == 'MCQ' %}
            <ul class="options-list">
                {% for opt in item.options %}
                    <li>
                        <label>
                            <input type="radio" name="q{{item.q.id}}" value="{{ opt.val }}">
                            <span>{{ opt.text }}</span>
                        </label>
                    </li>
                {% endfor %}
            </ul>
        {% elif item.q.q_type == 'FITB' %}
            <input type="text" name="q{{item.q.id}}" placeholder="Type answer here">
        {% else %}
            <textarea name="q{{item.q.id}}" rows="4"></textarea>
        {% endif %}
    </div>
{% endfor %}
                    <button type="submit" class="submit-btn">Submit Examination</button>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.min.js"></script>
<script>
    // 1. STATE & STABILIZATION
    let isAutoSubmitting = false;
    let isExamLoadedFully = false;
    window.addEventListener('load', () => { setTimeout(() => { isExamLoadedFully = true; }, 5000); });

    // 2. LOAD AI MODELS
    async function initProctoring() {
        await faceapi.nets.tinyFaceDetector.loadFromUri('/static/models');
        const video = document.getElementById('video');
        const stream = await navigator.mediaDevices.getUserMedia({ video: {} });
        video.srcObject = stream;

        video.addEventListener('play', () => {
            setInterval(async () => {
                if (!isExamLoadedFully || isAutoSubmitting) return;

                // A. Face Detection
                const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions());
                if (!detection) { terminateExam("face_lost"); return; }

                // B. Lighting/Darkness Check
                const canvas = document.createElement('canvas');
                canvas.width = 160; canvas.height = 120;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(video, 0, 0, 160, 120);
                const data = ctx.getImageData(0, 0, 160, 120).data;
                let brightness = 0;
                for (let i = 0; i < data.length; i += 4) brightness += (data[i] + data[i+1] + data[i+2]) / 3;
                if ((brightness / (160 * 120)) < 15) { terminateExam("camera_covered_or_too_dark"); }
            }, 2000);
        });
    }
    initProctoring();

   // 2. TIMER LOGIC
const storageKey = "exam_{{ course.id }}_{{ index_number }}_time_left";

// Get saved time, but ONLY use it if it's greater than 0
const savedTime = localStorage.getItem(storageKey);
let timeLeft = (savedTime && parseInt(savedTime, 10) > 0)
                ? parseInt(savedTime, 10)
                : parseInt("{{ duration_ms|default:'0' }}", 10);

const timerDisplay = document.getElementById('timer');

// Safety: If the page loads and the exam is already past the end time, kill it immediately
const serverEndTime = new Date("{{ course.end_time|date:'Y-m-d H:i:s' }}").getTime();
if (new Date().getTime() > serverEndTime) {
    terminateExam("time_expired");
}

const countdown = setInterval(() => {
    timeLeft -= 1000;

    // Persist only positive values
    if (timeLeft > 0) {
        localStorage.setItem(storageKey, timeLeft);
    } else {
        localStorage.removeItem(storageKey); // Clear it once finished
    }

    let m = Math.floor(timeLeft / 60000);
    let s = Math.floor((timeLeft % 60000) / 1000);
    timerDisplay.innerHTML = m + ":" + (s < 10 ? "0" : "") + s;

    if (timeLeft <= 0) {
        clearInterval(countdown);
        terminateExam("time_expired");
    }
}, 1000);

    // 3. UNIFIED TERMINATION
    function terminateExam(breachType) {
        if (isAutoSubmitting) return;
        isAutoSubmitting = true;

        // Update breach flag and UI
        document.getElementById('security_breach_flag').value = breachType;
        const form = document.getElementById('quizForm');

        // Visual feedback
        document.body.style.opacity = "0.5";
        document.body.style.pointerEvents = "none";
        alert("Examination session ending: " + breachType.replace('_', ' ').toUpperCase());

        // Force submit
        form.submit();
    }

    // 4. ANTI-CHEAT MONITORS - AGGRESSIVE DETECTION
let isFocused = true;

// 1. Detect Focus Loss (Task View, Alt+Tab, Switching Apps)
window.addEventListener("blur", () => {
    isFocused = false;
    if (isExamLoadedFully && !isAutoSubmitting) {
        terminateExam("window_focus_lost");
    }
});

window.addEventListener("focus", () => {
    isFocused = true;
});

// 2. Detect Tab Switching
document.addEventListener("visibilitychange", () => {
    if (document.hidden && isExamLoadedFully && !isAutoSubmitting) {
        terminateExam("tab_switch");
    }
});

// 3. Detect Split Screen / Window Resize
setInterval(() => {
    // Check if window is significantly smaller than the primary screen
    // or if the window is moved to a side (common in split screen)
    if (isExamLoadedFully && !isAutoSubmitting) {
        if (window.innerWidth < (screen.width * 0.8)) {
            terminateExam("split_screen");
        }
    }
}, 1000);
    // 5. CAMERA & GEOLOCATION (Added explicit failure handling)
    navigator.mediaDevices.getUserMedia({ video: true })
        .then(s => document.getElementById('video').srcObject = s)
        .catch(err => {
            alert("Camera access is mandatory for this exam. Redirecting...");
            window.location.href = "/";
        });

    // 6. PREVENT FORM DOUBLE SUBMISSION
    document.getElementById('quizForm').addEventListener('submit', function(e) {
        if (isAutoSubmitting) return;
        if (!confirm("Are you sure you want to submit your answers? This cannot be undone.")) {
            e.preventDefault();
        } else {
            isAutoSubmitting = true;
            document.querySelector('.submit-btn').disabled = true;
            document.querySelector('.submit-btn').innerText = "Submitting...";
        }
    });
</script>
</body>
</html>
