<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{{ course.exam_name }} | {{ course.code }}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; height: 100vh; width: 100vw; overflow: hidden; display: flex; flex-direction: column; }
        .exam-header { background: #1e293b; color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; z-index: 10; }
        .workspace-wrapper { display: flex; flex: 1; width: 100%; height: calc(100vh - 70px); overflow: hidden; }
        .scrollable-content { flex: 1; height: 100%; overflow-y: auto; padding: 30px; }
        #video { width: 180px; position: fixed; top: 85px; right: 20px; border: 3px solid #ef4444; border-radius: 10px; z-index: 1000; background: #000; aspect-ratio: 3/4; object-fit: cover; }
        .timer-box { background: #ef4444; color: white; padding: 8px 16px; border-radius: 6px; font-weight: bold; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 40px; border-radius: 12px; }
        .question-block { margin-bottom: 30px; padding: 20px; border-left: 5px solid #2563eb; background: #f8fafc; }
        .submit-btn { background: #2563eb; color: white; border: none; padding: 14px 35px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        @media (max-width: 768px) { #video { width: 115px; bottom: 20px; top: auto; } }
    </style>
</head>
<body oncontextmenu="return false;" onselectstart="return false;" ondragstart="return false;">

    <div class="exam-header">
        <div><h2>{{ course.exam_name }}</h2><p style="font-size: 0.85rem;">{{ course.code }}</p></div>
        <div class="timer-box">Time Left: <span id="timer">--:--</span></div>
    </div>

    <div class="workspace-wrapper">
        <video id="video" autoplay muted playsinline></video>
        <div class="scrollable-content">
            <div class="container">
                <form id="quizForm" action="{% url 'submit_quiz' %}" method="POST" onsubmit="return handleManualSubmit(event);">
                    {% csrf_token %}
                    <input type="hidden" name="full_name" value="{{ student_name }}">
                    <input type="hidden" name="index_number" value="{{ index_number }}">
                    <input type="hidden" name="course_id" value="{{ course.id }}">
                    <input type="hidden" id="security_breach_flag" name="security_breach" value="false">

                    {% for q in questions %}
                        <div class="question-block">
                            <p><strong>{{ forloop.counter }}. {{ q.text }}</strong></p>
                            {% if q.q_type == 'MCQ' %}<ul style="list-style:none;"><li><label><input type="radio" name="q{{q.id}}" value="A"> A. {{ q.option_a }}</label></li><li><label><input type="radio" name="q{{q.id}}" value="B"> B. {{ q.option_b }}</label></li></ul>
                            {% else %}<input type="text" name="q{{q.id}}" style="width: 100%; padding: 10px;">{% endif %}
                        </div>
                    {% endfor %}
                    <button type="submit" class="submit-btn">Submit Examination</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        let isAutoSubmitting = false;
        let isExamLoadedFully = false;

        // 5-second grace period prevents mobile UI glitches from triggering breaches
        window.addEventListener('load', () => { setTimeout(() => { isExamLoadedFully = true; }, 5000); });

        // Timer & Storage Logic
        const storageKeyPrefix = "exam_{{ course.id }}_{{ index_number }}_";
        let timeLeft = parseInt(localStorage.getItem(storageKeyPrefix + "time_left") || "{{ duration_ms|default:'0' }}", 10);

        const countdown = setInterval(() => {
            timeLeft -= 1000;
            localStorage.setItem(storageKeyPrefix + "time_left", timeLeft);
            let mins = Math.floor(timeLeft / 60000), secs = Math.floor((timeLeft % 60000) / 1000);
            document.getElementById('timer').innerHTML = mins + ":" + (secs < 10 ? "0" : "") + secs;
            if (timeLeft <= 0) { clearInterval(countdown); triggerBreach("time_expired"); }
        }, 1000);

        function triggerBreach(breachType) {
            if (isAutoSubmitting || !isExamLoadedFully) return;
            isAutoSubmitting = true;
            document.getElementById('security_breach_flag').value = breachType;
            localStorage.removeItem(storageKeyPrefix + "time_left");
            localStorage.removeItem(storageKeyPrefix + "saved_answers");
            alert("SECURITY ALERT: " + breachType + ". Submitting paper.");
            document.getElementById('quizForm').submit();
        }

        // Monitors
        document.addEventListener("visibilitychange", () => { if (document.hidden) triggerBreach("tab_switch"); });
        window.addEventListener('resize', () => { if (window.innerWidth < (screen.width * 0.3)) triggerBreach("split_screen"); });

        function handleManualSubmit(e) {
            if (!confirm("Submit examination?")) { e.preventDefault(); return false; }
            isAutoSubmitting = true;
            return true;
        }

        // Camera & Geolocation (Simplified)
        navigator.mediaDevices.getUserMedia({ video: true }).then(s => document.getElementById('video').srcObject = s).catch(() => window.location.href="/");
    </script>
</body>
</html>
