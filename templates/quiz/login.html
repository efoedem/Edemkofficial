<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal | Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        :root {
            --primary: #2563eb;
            --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            --glass: rgba(255, 255, 255, 0.9);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            color: #1e293b;
        }

        .login-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 2.5rem;
            border-radius: 1.5rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        h2 { font-weight: 600; margin-bottom: 0.5rem; color: #0f172a; }
        p.subtitle { font-size: 0.875rem; color: #64748b; margin-bottom: 2rem; }
        .input-group { text-align: left; margin-bottom: 1.25rem; }
        label { display: block; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; margin-bottom: 0.5rem; color: #475569; }
        input, select { width: 100%; padding: 0.75rem 1rem; border-radius: 0.75rem; border: 1px solid #cbd5e1; background: white; font-size: 1rem; box-sizing: border-box; }
        button { width: 100%; padding: 0.75rem; background: var(--primary); color: white; border: none; border-radius: 0.75rem; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 1rem; }
        button:disabled { background: #94a3b8; cursor: not-allowed; }
        .error-msg { color: #dc2626; font-size: 0.875rem; margin-bottom: 1rem; font-weight: 600; }
        .gps-status { font-size: 0.75rem; color: #059669; font-weight: 600; margin-top: 0.5rem; text-align: left; }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>Student Login</h2>
        <p class="subtitle">Enter your details to begin the examination</p>

        {% if error %}
            <div class="error-msg">{{ error }}</div>
        {% endif %}

        <form action="{% url 'start_quiz' %}" method="POST" id="main_form">
            {% csrf_token %}

            <input type="hidden" name="lat" id="lat_input">
            <input type="hidden" name="lng" id="lng_input">

            <div class="input-group">
                <label>Full Name</label>
                <input type="text" name="full_name" placeholder="e.g. Prince Edem" required>
            </div>

            <div class="input-group">
                <label>Index Number</label>
                <input type="text" name="index_number" placeholder="Enter ID" required>
            </div>

            <div class="input-group">
                <label>Select Lecturer</label>
                <select id="lecturer_select" name="lecturer_id" required>
                    <option value="" disabled selected>Choose Lecturer...</option>
                    {% for l in lecturers %}
                        <option value="{{ l.id }}">{{ l }}</option>
                    {% endfor %}
                </select>
            </div>

            <div id="course_section" class="input-group" style="display:none;">
                <label>Course Code</label>
                <select id="course_select" name="course_id" required></select>
            </div>

            <div id="gps_feedback" class="gps-status" style="color: #d97706;">Acquiring satellite location fix...</div>

            <button type="submit" id="start_btn" disabled>Waiting for GPS Fix...</button>
        </form>
    </div>

    <script>
    let gpsAcquired = false;

    // Helper function to safely unlock the start button only if form rules and location are valid
    function checkAndUnlockButton() {
        if (gpsAcquired && ($('#course_select').val() || $('#lecturer_select').val())) {
            $('#start_btn').prop('disabled', false).text('Start Quiz Session');
        } else if (!gpsAcquired) {
            $('#start_btn').prop('disabled', true).text('Waiting for Verified Location...');
        }
    }

    // 1. AJAX logic to fetch courses dynamically
    $('#lecturer_select').change(function() {
        const lecturerId = $(this).val();
        if (lecturerId) {
            $.ajax({
                url: "{% url 'get_courses' %}",
                data: { 'lecturer_id': lecturerId },
                success: function(data) {
                    $('#course_select').empty();
                    $('#course_select').append('<option value="" disabled selected>Select Course...</option>');
                    data.forEach(course => {
                        $('#course_select').append(`<option value="${course.id}">${course.code} - ${course.title}</option>`);
                    });
                    $('#course_section').show();
                    checkAndUnlockButton();
                }
            });
        }
    });

    // 2. Strict Geolocation Core Engine
    function acquireStrictLocation() {
        gpsAcquired = false;
        $('#gps_feedback').text('Acquiring secure exam hall coordinates...').css('color', '#d97706');
        $('#start_btn').prop('disabled', true).text('Verifying Location...');

        if ("geolocation" in navigator) {
            navigator.geolocation.getCurrentPosition(
                function(position) {
                    // Bind real physical coordinates to hidden inputs
                    document.getElementById('lat_input').value = position.coords.latitude;
                    document.getElementById('lng_input').value = position.coords.longitude;

                    gpsAcquired = true;
                    $('#gps_feedback').text('✓ Location Verified Natively').css('color', '#059669');
                    checkAndUnlockButton();
                },
                function(error) {
                    gpsAcquired = false;
                    console.log("Security error caught: ", error.message);

                    // Display clear error states to the student based on failure type
                    if (error.code === error.PERMISSION_DENIED) {
                        $('#gps_feedback').html('✕ Location Access Denied. You must allow location tracking in your browser settings.').css('color', '#dc2626');
                    } else {
                        $('#gps_feedback').html('✕ Network Signal Weak. <span id="retry_geo" style="text-decoration: underline; cursor: pointer; font-weight: bold;">Tap here to retry connection</span>').css('color', '#dc2626');
                    }
                    checkAndUnlockButton();
                },
                {
                    enableHighAccuracy: false, // 🚀 FORCES cellular & Wi-Fi triangulation for instant indoor verification
                    timeout: 12000,            // Allows 12 seconds to compile accurate network triangulation
                    maximumAge: 60000          // Re-verify coordinates if cache data is older than 60 seconds
                }
            );
        } else {
            $('#gps_feedback').text('✕ Browser security rules unsupported. Use Chrome or Safari.').css('color', '#dc2626');
        }
    }

    // Initialize tracking routine on page launch
    $(document).ready(function() {
        acquireStrictLocation();

        // Bind dynamic tap-to-retry action if the signal clips indoors
        $(document).on('click', '#retry_geo', function() {
            acquireStrictLocation();
        });
    });

    // Re-verify anytime they try to alter selections to block perimeter spoofing
    $('#course_select').change(checkAndUnlockButton);
</script>
</body>
</html>
