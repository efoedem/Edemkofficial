<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Examination Submitted</title>
    <style>
        body { font-family: 'Inter', sans-serif; text-align: center; padding: 50px; background: #f4f7f6; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 1.5rem; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); max-width: 450px; width: 100%; }
        .score-circle { width: 100px; height: 100px; line-height: 100px; border-radius: 50%; background: #2563eb; color: white; font-size: 2rem; margin: 20px auto; font-weight: bold; }
        h1 { color: #0f172a; margin-bottom: 0.5rem; }
        p { color: #475569; margin-bottom: 2rem; }
        .exit-btn { display: inline-block; padding: 12px 30px; background: #0f172a; color: white; border-radius: 8px; text-decoration: none; font-weight: 600; transition: background 0.2s; }
        .exit-btn:hover { background: #334155; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Submission Received</h1>
        <p>Thank you, <strong>{{ student_name }}</strong>. Your script has been safely processed and logged.</p>

        {% if show_score %}
            <div class="score-box">
                <h3>Final Score:</h3>
                <div class="score-circle">{{ score }}</div>
                <p>Points obtained on this examination tier.</p>
            </div>
        {% else %}
            <div class="info-box" style="background: #f1f5f9; padding: 15px; border-radius: 8px; margin-bottom: 2rem;">
                <p style="color: #64748b; margin: 0; font-size: 0.9rem;">
                    Results are currently held pending formal moderator review.
                </p>
            </div>
        {% endif %}

        <a href="{% url 'login_portal' %}" class="exit-btn">Close Session & Exit</a>
    </div>

    <script>
        // Security: Prevent users from going back to the exam after submission
        window.history.pushState(null, null, window.location.href);
        window.onpopstate = function () {
            window.history.go(1);
        };
    </script>
</body>
</html>
